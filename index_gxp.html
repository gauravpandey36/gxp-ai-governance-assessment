/* ---------- STORAGE ABSTRACTION (window.storage -> localStorage fallback) ---------- */
const storage = {
  _mem: {},
  get(key) {
    try {
      if (typeof window !== "undefined" && window.storage && window.storage.getItem) {
        return window.storage.getItem(key);
      }
      if (typeof window !== "undefined" && window.localStorage) {
        return window.localStorage.getItem(key);
      }
    } catch (e) {}
    return this._mem[key] || null;
  },
  set(key, val) {
    try {
      if (typeof window !== "undefined" && window.storage && window.storage.setItem) {
        window.storage.setItem(key, val);
        return;
      }
      if (typeof window !== "undefined" && window.localStorage) {
        window.localStorage.setItem(key, val);
        return;
      }
    } catch (e) {}
    this._mem[key] = val;
  },
  remove(key) {
    try {
      if (typeof window !== "undefined" && window.storage && window.storage.removeItem) {
        window.storage.removeItem(key);
        return;
      }
      if (typeof window !== "undefined" && window.localStorage) {
        window.localStorage.removeItem(key);
        return;
      }
    } catch (e) {}
    delete this._mem[key];
  },
};

  "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
    const r = (Math.random() * 16) | 0;
    const v = c === "x" ? r : (r & 0x3) | 0x8;
    return v.toString(16);

  { id: "LLM02", name: "Insecure Output Handling", applies: (i) => /Advisory|Automated/i.test(i.I6 || "") && /Yes/i.test(i.I7 || "") },
  { id: "LLM03", name: "Training Data Poisoning", applies: (i) => /Fine-tuned|custom/i.test(i.I8 || "") || (i.I3 || []).includes("Traditional ML Model (classifier, regression)") },
  { id: "LLM04", name: "Model Denial of Service", applies: (i) => /Cloud/i.test(i.I4 || "") && /Advisory|Automated|Decision/i.test(i.I6 || "") },
  { id: "LLM05", name: "Supply Chain Vulnerabilities", applies: (i) => /COTS|Fine-tuned/i.test(i.I8 || "") && /Cloud|Hybrid/i.test(i.I4 || "") },
  { id: "LLM06", name: "Sensitive Information Disclosure", applies: (i) => /PHI|Proprietary|Clinical|Pharmacovigilance/i.test(i.I5 || "") && (i.I3 || []).some((v) => /LLM|Generative/i.test(v)) },
  { id: "LLM07", name: "Insecure Plugin/Tool Design", applies: (i) => (i.I9 || []).some((v) => /Internal GxP|External/i.test(v)) },
  { id: "LLM08", name: "Excessive Agency", applies: (i) => /Automated/i.test(i.I6 || "") && (i.I9 || []).includes("Multi-agent orchestration (other agents)") },
  { id: "LLM09", name: "Overreliance", applies: (i) => /Advisory|Decision support/i.test(i.I6 || "") },
  { id: "LLM10", name: "Model Theft", applies: (i) => /Cloud|Hybrid/i.test(i.I4 || "") && /Fine-tuned/i.test(i.I8 || "") },
];

/* ==================== GAMP 5 CATEGORY ASSIGNMENT ==================== */
function gampCategory(intake) {
  const i3 = intake.I3 || [];
  const i8 = intake.I8 || "";
  if (i3.includes("RAG Pipeline") || i3.includes("Multi-Agent System") || /Fully custom|Fine-tuned|significant custom/i.test(i8)) {
    return { cat: "Cat. 5", depth: "Full SDLC: URS, FS, DS, code review, unit/integration test, PQ; Appendix D11 AI lifecycle; ISPE GAMP AI Guide 2025" };
  }
  if (/COTS platform configured/i.test(i8)) {
    return { cat: "Cat. 4", depth: "Full IQ/OQ/PQ or CSA equivalent; configuration testing; PQ on GxP dataset" };
  }
  if (/COTS/i.test(i8)) {
    return { cat: "Cat. 3", depth: "IQ + OQ; leveraged supplier testing" };
  }
  return { cat: "Cat. 4", depth: "Configured system validation — full IQ/OQ/PQ or CSA equivalent" };
}

/* ==================== LOCAL RISK TIER CLASSIFICATION ==================== */
function classifyRiskTier(intake, m1) {
  const reasons = [];
  let tier = "LOW";

  const isLLM = /Yes, LLM|Yes, fine-tuned|Generative/i.test(m1["M1-3"] || "") ||
    (intake.I3 || []).some((v) => /LLM|Generative/i.test(v));
  const isDynamic = /Dynamic/i.test(m1["M1-4"] || "");
  const m1_2 = m1["M1-2"] || "";
  const criticalGMP = /batch disposition|More than one/i.test(m1_2);

  // UNRESOLVABLE HIGH
  if (isLLM && criticalGMP) {
    return {
      tier: "HIGH",
      subtier: "UNRESOLVABLE",
      reasons: [
        "LLM/GenAI in critical GMP (EU Annex 22 explicitly restricts this)",
        "Cannot reduce with controls alone — must redesign",
      ],
    };
  }
  if (isDynamic && criticalGMP) {
    return {
      tier: "HIGH",
      subtier: "DYNAMIC_CRITICAL",
      reasons: [
        "Dynamic AI in critical GMP — EU Annex 22 requires static; cannot reduce without making static",
      ],
    };
  }

  // HIGH triggers
  if (/Yes — directly/i.test(m1["M1-1"] || "")) { tier = "HIGH"; reasons.push("M1-1: Direct GxP safety/quality impact"); }
  if (m1_2 && !/No/i.test(m1_2)) { tier = "HIGH"; reasons.push("M1-2: Influences batch/clinical/PV decisions"); }
  if (/Fully automated/i.test(m1["M1-5"] || "")) { tier = "HIGH"; reasons.push("M1-5: No mandatory human review"); }
  if (/No — outputs auto-execute/i.test(m1["M1-6"] || "")) { tier = "HIGH"; reasons.push("M1-6: No human override capability"); }
  if (/Catastrophic|Severe/i.test(m1["M1-9"] || "")) { tier = "HIGH"; reasons.push("M1-9: Catastrophic/severe failure consequence"); }

  if (tier === "HIGH") return { tier, reasons };

  // MEDIUM
  if (
    /indirectly/i.test(m1["M1-1"] || "") &&
    /HITL|HOTL/i.test(m1["M1-5"] || "") &&
    /Moderate/i.test(m1["M1-9"] || "") &&
    /Immediately detectable/i.test(m1["M1-10"] || "")
  ) {
    return { tier: "MEDIUM", reasons: ["Indirect impact + HITL + moderate severity + detectable"] };
  }

  // LOW
  if (
    /No/i.test(m1["M1-1"] || "") &&
    /Deterministic/i.test(m1["M1-7"] || "") &&
    /Minor|Negligible/i.test(m1["M1-9"] || "")
  ) {
    return { tier: "LOW", reasons: ["No direct impact + deterministic + minor consequence"] };
  }

  return { tier: "MEDIUM", reasons: ["Default: mixed signals; treat as Medium pending full assessment"] };
}

/* ==================== CLAUDE API CALL ====================
 * Tries Claude-in-Claude artifact helper first (window.claude.complete),
 * then falls back to direct fetch to the Anthropic API.
 * Always returns { ok, data, raw, error } and never throws.
 * ====================================================================== */
function tryParseJSON(text) {
  if (!text || typeof text !== "string") return null;
  let cleaned = text.trim();
  // Strip leading/trailing markdown code fences
  cleaned = cleaned.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/i, "").trim();
  try {
    return JSON.parse(cleaned);
  } catch (e) {}
  // Try extracting first {...} or [...] block
  const m = cleaned.match(/[\{\[][\s\S]*[\}\]]/);
  if (m) {
    try {
      return JSON.parse(m[0]);
    } catch (e2) {}
  }
  return null;
}

async function callClaude(userPrompt, maxTokens = 2000) {
  const fullPrompt = SYSTEM_PROMPT + "\n\n=== USER REQUEST ===\n" + userPrompt;

  // PATH 1: Claude-in-Claude artifact helper (preferred in Claude artifact runtime)
  try {
    if (
      typeof window !== "undefined" &&
      window.claude &&
      typeof window.claude.complete === "function"
    ) {
      const text = await window.claude.complete(fullPrompt);
      const parsed = tryParseJSON(text);
      if (parsed) return { ok: true, data: parsed, raw: text };
      return { ok: false, error: "window.claude returned non-JSON output", raw: text };
    }
  } catch (err) {
    // fall through to fetch
  }

  // PATH 2: Direct fetch to Anthropic API
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: maxTokens,
        temperature: 0,
        system: SYSTEM_PROMPT,
        messages: [{ role: "user", content: userPrompt }],
      }),
    });
    if (!resp.ok) {
      let bodyText = "";
      try { bodyText = await resp.text(); } catch (e) {}
      return { ok: false, error: `API ${resp.status}: ${(bodyText || "").slice(0, 200)}` };
    }
    const data = await resp.json();
    const text = (data && data.content && data.content[0] && data.content[0].text) || "";
    const parsed = tryParseJSON(text);
    if (parsed) return { ok: true, data: parsed, raw: text };
    return { ok: false, error: "Could not parse JSON response", raw: text };
  } catch (err) {
    return { ok: false, error: (err && err.message) || String(err) };
  }
}

/* ==================== STATE REDUCER ==================== */
const initialState = {
  sessionId: null,
  phase: "welcome", // welcome | intake | module | report
  activeModule: 1,
  org: "",
  intake: {},
  modules: {}, // { 1: {answers: {M1-1:...}, result: {...}, status:'idle|loading|done'} }
  report: null,
  reportStatus: "idle",
};

function reducer(state, action) {
  switch (action.type) {
    case "LOAD":
      return { ...state, ...action.payload };
    case "SET_PHASE":
      return { ...state, phase: action.phase };
    case "SET_ORG":
      return { ...state, org: action.org };
    case "SET_INTAKE":
      return { ...state, intake: { ...state.intake, [action.id]: action.value } };
    case "SET_MODULE_ANSWER": {
      const mod = state.modules[action.moduleId] || { answers: {}, result: null, status: "idle" };
      return {
        ...state,
        modules: {
          ...state.modules,
          [action.moduleId]: { ...mod, answers: { ...mod.answers, [action.qid]: action.value } },
        },
      };
    }
    case "SET_MODULE_RESULT": {
      const mod = state.modules[action.moduleId] || { answers: {}, result: null, status: "idle" };
      return {
        ...state,
        modules: {
          ...state.modules,
          [action.moduleId]: { ...mod, result: action.result, status: action.status || "done" },
        },
      };
    }
    case "SET_ACTIVE_MODULE":
      return { ...state, activeModule: action.moduleId };
    case "SET_REPORT":
      return { ...state, report: action.report, reportStatus: action.status || "done" };
    case "SET_REPORT_STATUS":
      return { ...state, reportStatus: action.status };
    case "RESET":
      return { ...initialState, sessionId: genId() };
    default:
      return state;
  }
}

/* ==================== SHOW IF HELPER ==================== */
function visibleQuestions(group, intake) {
  return group.questions.filter((q) => !q.showIf || q.showIf(intake));
}

/* ==================== PROGRESS CALC ==================== */
function countTotalQuestions(state) {
  let total = INTAKE_QUESTIONS.length;
  let answered = Object.keys(state.intake).filter((k) => {
    const v = state.intake[k];
    return Array.isArray(v) ? v.length > 0 : v != null && v !== "";
  }).length;
  for (const m of MODULES) {
    for (const g of m.groups) {
      for (const q of g.questions) {
        if (q.showIf && !q.showIf(state.intake)) continue;
        total += 1;
        const modAns = (state.modules[m.id] && state.modules[m.id].answers) || {};
        const v = modAns[q.id];
        if (Array.isArray(v) ? v.length > 0 : v != null && v !== "") answered += 1;
      }
    }
  }
  return { answered, total };
}

              className={`px-3 py-2 text-xs font-medium border-b-2 transition ${
                active
                  ? "border-blue-600 text-blue-700"
                  : "border-transparent text-slate-600 hover:text-slate-900"
              }`}
            >
              M{m.id} {doneBadge}
            </button>
          );
        })}
      </div>

      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div>
          <h2 className="text-2xl font-bold text-slate-900">
            Module {mod.id}: {mod.name}
          </h2>
          <p className="text-sm text-slate-600 max-w-3xl">{mod.purpose}</p>
          <div className="flex flex-wrap gap-1 mt-2">
            {mod.tags.map((t) => (
              <Badge key={t} color="blue">
                {t}
              </Badge>
            ))}
          </div>
        </div>
        <div className="text-right space-y-1">
          {localTier && <RiskTierBadge tier={localTier.tier} subtier={localTier.subtier} />}
          <div className="text-xs text-slate-500">
            {answeredQ} / {allVisibleQuestions.length} answered
          </div>
          {savedFlash && <div className="text-xs text-emerald-600">✓ Assessment saved</div>}
        </div>
      </div>

      {mod.id === 1 && localTier && complete && <RiskDashboard localTier={localTier} intake={intake} />}

      {/* OWASP applicability auto-shown on Module 5 */}
      {mod.id === 5 && (
        <div className="border border-slate-200 rounded-lg bg-white p-4">
          <h3 className="font-semibold text-slate-900 text-sm mb-2">OWASP LLM Top 10 Applicability (auto from Intake)</h3>
          <div className="grid sm:grid-cols-2 gap-2 text-xs">
            {OWASP_LLM10.map((r) => {
              const applies = r.applies(intake);
              return (
                <div
                  key={r.id}
                  className={`p-2 rounded border ${applies ? "bg-red-50 border-red-200" : "bg-slate-50 border-slate-200"}`}
                >
                  <div className="font-semibold text-slate-800">
                    {r.id}: {r.name}
                  </div>
                  <div className={`text-xs ${applies ? "text-red-700" : "text-slate-500"}`}>
                    {applies ? "APPLIES to your system" : "Not applicable"}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Module 6 operational mode */}
      {mod.id === 6 && (
        <div className="border border-slate-200 rounded-lg bg-white p-4 text-xs text-slate-700">
          <span className="font-semibold">Operational mode detected: </span>
          {(intake.I3 || []).includes("Multi-Agent System")
            ? "AgentOps (multi-agent)"
            : (intake.I3 || []).includes("RAG Pipeline")
            ? "LLMOps + Retrieval Monitoring"
            : (intake.I3 || []).some((v) => /LLM|Generative/i.test(v))
            ? "LLMOps"
            : "MLOps"}
        </div>
      )}

      {/* Groups */}
      {mod.groups.map((g) => {
        const vqs = visibleQuestions(g, intake);
        if (vqs.length === 0) return null;
        return (
          <div key={g.name} className="space-y-3">
            <h3 className="font-semibold text-slate-900 text-sm uppercase tracking-wide border-b border-slate-200 pb-1">
              {g.name}
            </h3>
            {vqs.map((q) => (
              <Question
                key={q.id}
                q={q}
                value={modState.answers[q.id]}
                onChange={(v) => dispatch({ type: "SET_MODULE_ANSWER", moduleId: mod.id, qid: q.id, value: v })}
              />
            ))}
          </div>
        );
      })}

      <ModuleResultCard result={modState.result} status={modState.status} localTier={localTier} moduleId={mod.id} />

      <div className="flex justify-between items-center pt-4 flex-wrap gap-2">
        <button
          onClick={() => dispatch({ type: "SET_PHASE", phase: "intake" })}
          className="text-sm text-slate-500 hover:text-slate-700"
        >
          ← Intake
        </button>
        <div className="flex gap-2 flex-wrap">
          {(!modState.result || modState.result._error) && (
            <button
              disabled={!complete || modState.status === "loading"}
              onClick={submitModule}
              className="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium disabled:bg-slate-300 hover:bg-blue-700"
            >
              {modState.status === "loading"
                ? "Analysing..."
                : modState.result && modState.result._error
                ? "Retry Submit"
                : "Submit Module"}
            </button>
          )}
          {modState.result && nextModuleId && (
            <button
              onClick={() => dispatch({ type: "SET_ACTIVE_MODULE", moduleId: nextModuleId })}
              className="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700"
            >
              Next Module →
            </button>
          )}
          {modState.result && !nextModuleId && (
            <button
              onClick={() => dispatch({ type: "SET_PHASE", phase: "report" })}
              className="px-5 py-2 bg-emerald-600 text-white rounded-lg font-medium hover:bg-emerald-700"
            >
              Generate Final Report →
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- Report Screen ---------- */
function ReportScreen({ state, dispatch }) {
  const report = state.report;
  const status = state.reportStatus;
  const [copied, setCopied] = useState(false);

  // Auto-generate when report is missing and status is idle
  useEffect(() => {
    if (!state.report && state.reportStatus === "idle") {
      generateReport();
    }
    // eslint-disable-next-line
  }, [state.report, state.reportStatus]);

  async function generateReport() {
    dispatch({ type: "SET_REPORT_STATUS", status: "loading" });
    const payload = {
      orgType: state.org,
      intake: state.intake,
      modules: Object.fromEntries(
        Object.entries(state.modules).map(([k, v]) => [k, { answers: v.answers, interim: v.result }])
      ),
      gampCategory: gampCategory(state.intake),
      owaspApplicability: OWASP_LLM10.filter((r) => r.applies(state.intake)).map((r) => `${r.id}: ${r.name}`),
    };
    const prompt = `Generate the final consolidated GxP AI Governance Assessment Report using the full report JSON schema from PART 4. Input data: ${JSON.stringify(payload)}. Include all 9 report sections: system profile, go determination, risk tier matrix (current AND achievable), per-module findings, regulatory requirements matrix, risk reduction pathway, prioritised P1/P2/P3 action checklist, validation roadmap, regulatory citation index. Respond ONLY in JSON.`;
    const res = await callClaude(prompt, 4000);
    if (res.ok) {
      dispatch({ type: "SET_REPORT", report: res.data });
    } else {
      // Local fallback report
      const localTier = state.modules[1] && state.modules[1].answers
        ? classifyRiskTier(state.intake, state.modules[1].answers)
        : { tier: "MEDIUM", reasons: [] };
      const gamp = gampCategory(state.intake);
      const fallback = {
        _error: res.error,
        go_determination:
          localTier.subtier === "UNRESOLVABLE" ? "NO_GO" : localTier.tier === "HIGH" ? "CONDITIONAL_GO" : "GO",
        rationale:
          "Local heuristic fallback — API unavailable. Based on Module 1 classification and intake characteristics.",
        risk_tier: {
          current: localTier.tier,
          achievable:
            localTier.tier === "HIGH" ? "MEDIUM (with mandatory HITL + static model + validation)" : localTier.tier,
          eu_ai_act: localTier.tier === "HIGH" ? "High-Risk (Annex III)" : "Limited/Minimal Risk",
          eu_annex_22: localTier.tier === "HIGH" ? "Critical GMP Application" : "Non-Critical GMP",
          gamp5: gamp.cat,
          nist_rmf: localTier.tier,
        },
        system_profile: `${state.org} · GxP: ${(state.intake.I1 || []).join(", ")} · AI: ${(state.intake.I3 || []).join(", ")} · Deployment: ${state.intake.I4} · Oversight: ${state.intake.I6}`,
        module_findings: Object.entries(state.modules).map(([k, v]) => ({
          module: Number(k),
          status: (v.result && v.result.status) || "AMBER",
          finding: (v.result && v.result.finding) || "No API result available.",
          gaps: (v.result && v.result.gaps) || [],
          citations: [],
        })),
        risk_reduction_pathway:
          localTier.subtier === "UNRESOLVABLE"
            ? [{ step: 1, action: "Redesign: replace GenAI with deterministic model OR convert to non-critical GMP with full HITL", regulation: "EU GMP Annex 22", effort: "High", type: "prerequisite" }]
            : [],
        action_checklist: [],
        validation_roadmap: { gamp_category: gamp.cat, lifecycle: gamp.depth, documentation: "URS, FS, DS, IQ/OQ/PQ or CSA evidence package, VSR", testing_approach: "Risk-based per GAMP 5 §9" },
        regulatory_citations: [],
      };
      dispatch({ type: "SET_REPORT", report: fallback });
    }
  }

  if (status === "loading" || !report) {
    return (
      <div className="max-w-4xl mx-auto p-6 text-center">
        <div className="animate-pulse text-slate-600 text-sm">
          Generating consolidated Go / No-Go report with Claude API...
        </div>
      </div>
    );
  }

  const goColor =
    report.go_determination === "GO"
      ? "green"
      : report.go_determination === "NO_GO"
      ? "red"
      : "amber";

  function toMarkdown() {
    const lines = [];
    lines.push(`# GxP AI Governance Assessment Report`);
    lines.push(`**Determination:** ${report.go_determination}`);
    lines.push(`**Risk Tier:** ${report.risk_tier?.current} → Achievable: ${report.risk_tier?.achievable}`);
    lines.push(`\n## System Profile\n${report.system_profile || ""}`);
    lines.push(`\n## Rationale\n${report.rationale || ""}`);
    lines.push(`\n## Risk Tier Matrix`);
    if (report.risk_tier) {
      lines.push(`- EU AI Act: ${report.risk_tier.eu_ai_act}`);
      lines.push(`- EU Annex 22: ${report.risk_tier.eu_annex_22}`);
      lines.push(`- GAMP 5: ${report.risk_tier.gamp5}`);
      lines.push(`- NIST AI RMF: ${report.risk_tier.nist_rmf}`);
    }
    if (report.module_findings) {
      lines.push(`\n## Per-Module Findings`);
      report.module_findings.forEach((m) => {
        lines.push(`\n### Module ${m.module} — ${m.status}`);
        lines.push(m.finding);
        (m.gaps || []).forEach((g) => lines.push(`- [${g.priority || ""}] ${g.description} (${g.regulation || ""} ${g.section || ""})`));
      });
    }
    if (report.risk_reduction_pathway) {
      lines.push(`\n## Risk Reduction Pathway`);
      report.risk_reduction_pathway.forEach((p) => lines.push(`${p.step}. ${p.action} — ${p.regulation} [${p.effort}, ${p.type}]`));
    }
    if (report.action_checklist) {
      lines.push(`\n## Prioritised Action Checklist`);
      report.action_checklist.forEach((a) => lines.push(`- [${a.priority}] ${a.action} (${a.role}) — ${a.basis}`));
    }
    if (report.validation_roadmap) {
      lines.push(`\n## Validation Roadmap`);
      lines.push(`- Category: ${report.validation_roadmap.gamp_category}`);
      lines.push(`- Lifecycle: ${report.validation_roadmap.lifecycle}`);
      lines.push(`- Documentation: ${report.validation_roadmap.documentation}`);
      lines.push(`- Testing: ${report.validation_roadmap.testing_approach}`);
    }
    if (report.regulatory_citations) {
      lines.push(`\n## Regulatory Citation Index`);
      report.regulatory_citations.forEach((c) => lines.push(`- ${c.instrument}: ${c.citation} (${c.type}) ${c.url || ""}`));
    }
    return lines.join("\n");
  }

  function copyMd() {
    const md = toMarkdown();
    try {
      if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(md).then(
          () => setCopied(true),
          () => fallbackCopy(md)
        );
      } else {
        fallbackCopy(md);
      }
    } catch (e) {
      fallbackCopy(md);
    }
    setTimeout(() => setCopied(false), 2000);
  }

  function fallbackCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
    } catch (e) {
      // last resort: open in new window
      try {
        const w = window.open("", "_blank");
        if (w) {
          w.document.write("<pre>" + text.replace(/[&<>]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])) + "</pre>");
        }
      } catch (e2) {}
    }
  }

  return (
    <div className="max-w-5xl mx-auto p-6 space-y-5 print:p-0">
      <div className="flex justify-between items-center print:hidden">
        <button
          onClick={() => dispatch({ type: "SET_PHASE", phase: "module" })}
          className="text-sm text-slate-500 hover:text-slate-700"
        >
          ← Back to Modules
        </button>
        <div className="flex gap-2">
          <button onClick={copyMd} className="px-3 py-1.5 border border-slate-300 rounded text-sm hover:bg-slate-50">
            {copied ? "✓ Copied" : "Copy as Markdown"}
          </button>
          <button onClick={() => window.print()} className="px-3 py-1.5 border border-slate-300 rounded text-sm hover:bg-slate-50">
            Print
          </button>
          <button
            onClick={() => {
              dispatch({ type: "SET_REPORT", report: null, status: "idle" });
            }}
            className="px-3 py-1.5 border border-slate-300 rounded text-sm hover:bg-slate-50"
          >
            Regenerate
          </button>
        </div>
      </div>

      <div className="border-2 border-slate-900 rounded-lg p-6 bg-white">
        <div className="text-xs text-slate-500 uppercase tracking-wide">GxP AI Governance Assessment Report</div>
        <div className="flex flex-wrap gap-2 items-center mt-2">
          <h1 className="text-3xl font-bold text-slate-900">
            Determination:{" "}
            <span className={goColor === "green" ? "text-emerald-700" : goColor === "red" ? "text-red-700" : "text-amber-700"}>
              {report.go_determination}
            </span>
          </h1>
          <RiskTierBadge tier={report.risk_tier?.current} />
        </div>
        {report.rationale && <p className="text-sm text-slate-700 mt-3">{report.rationale}</p>}
        {report._error && (
          <div className="mt-3 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">
            API unavailable — local heuristic fallback used. Error: {report._error}
          </div>
        )}
      </div>

      {/* System Profile */}
      {report.system_profile && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-2">1. System Profile</h2>
          <p className="text-sm text-slate-700">{report.system_profile}</p>
        </section>
      )}

      {/* Risk Tier */}
      {report.risk_tier && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">2. Risk Tier Dashboard</h2>
          <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 text-xs">
            <div className="p-3 bg-slate-50 rounded border border-slate-200">
              <div className="text-slate-500 uppercase tracking-wide mb-1">EU AI Act</div>
              <div className="font-semibold">{report.risk_tier.eu_ai_act}</div>
            </div>
            <div className="p-3 bg-slate-50 rounded border border-slate-200">
              <div className="text-slate-500 uppercase tracking-wide mb-1">EU Annex 22</div>
              <div className="font-semibold">{report.risk_tier.eu_annex_22}</div>
            </div>
            <div className="p-3 bg-slate-50 rounded border border-slate-200">
              <div className="text-slate-500 uppercase tracking-wide mb-1">GAMP 5</div>
              <div className="font-semibold">{report.risk_tier.gamp5}</div>
            </div>
            <div className="p-3 bg-slate-50 rounded border border-slate-200">
              <div className="text-slate-500 uppercase tracking-wide mb-1">NIST AI RMF</div>
              <div className="font-semibold">{report.risk_tier.nist_rmf}</div>
            </div>
          </div>
          {report.risk_tier.achievable && (
            <p className="text-sm text-slate-700 mt-3">
              <strong>Achievable tier:</strong> {report.risk_tier.achievable}
            </p>
          )}
        </section>
      )}

      {/* Per-Module Findings */}
      {report.module_findings && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">3. Per-Module Findings</h2>
          <div className="space-y-3">
            {report.module_findings.map((m, idx) => {
              const color = m.status === "GREEN" ? "green" : m.status === "RED" ? "red" : "amber";
              const modDef = MODULES.find((x) => x.id === Number(m.module));
              return (
                <div key={idx} className="border border-slate-200 rounded p-3 bg-slate-50">
                  <div className="flex gap-2 flex-wrap items-center mb-1">
                    <Badge color={color}>{m.status}</Badge>
                    <span className="text-sm font-semibold">
                      Module {m.module}: {modDef?.name}
                    </span>
                  </div>
                  <p className="text-sm text-slate-700">{m.finding}</p>
                  {m.gaps && m.gaps.length > 0 && (
                    <ul className="list-disc list-inside text-xs text-slate-700 mt-2 space-y-1">
                      {m.gaps.map((g, j) => (
                        <li key={j}>
                          <strong>{g.description}</strong> — {g.regulation} {g.section ? `(${g.section})` : ""}{" "}
                          {g.priority && <Badge color={g.priority === "P1" ? "red" : g.priority === "P2" ? "amber" : "slate"}>{g.priority}</Badge>}
                        </li>
                      ))}
                    </ul>
                  )}
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* Risk Reduction Pathway */}
      {report.risk_reduction_pathway && report.risk_reduction_pathway.length > 0 && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">4. Risk Reduction Pathway</h2>
          <ol className="list-decimal list-inside space-y-2 text-sm text-slate-700">
            {report.risk_reduction_pathway.map((p, i) => (
              <li key={i}>
                <strong>{p.action}</strong> — {p.regulation}{" "}
                <Badge color="blue">{p.effort}</Badge>{" "}
                <Badge color={p.type === "prerequisite" ? "red" : "slate"}>{p.type}</Badge>
              </li>
            ))}
          </ol>
        </section>
      )}

      {/* Action Checklist */}
      {report.action_checklist && report.action_checklist.length > 0 && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">5. Prioritised Action Checklist</h2>
          <ActionChecklist items={report.action_checklist} />
        </section>
      )}

      {/* Validation Roadmap */}
      {report.validation_roadmap && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">6. Validation Roadmap</h2>
          <dl className="text-sm text-slate-700 space-y-1">
            <div><dt className="inline font-semibold">GAMP Category: </dt><dd className="inline">{report.validation_roadmap.gamp_category}</dd></div>
            <div><dt className="inline font-semibold">Lifecycle: </dt><dd className="inline">{report.validation_roadmap.lifecycle}</dd></div>
            <div><dt className="inline font-semibold">Documentation: </dt><dd className="inline">{report.validation_roadmap.documentation}</dd></div>
            <div><dt className="inline font-semibold">Testing Approach: </dt><dd className="inline">{report.validation_roadmap.testing_approach}</dd></div>
          </dl>
        </section>
      )}

      {/* Regulatory Citations */}
      {report.regulatory_citations && report.regulatory_citations.length > 0 && (
        <section className="border border-slate-200 rounded-lg p-5 bg-white">
          <h2 className="font-semibold text-slate-900 mb-3">7. Regulatory Citation Index</h2>
          <ul className="text-xs text-slate-700 space-y-1 list-disc list-inside">
            {report.regulatory_citations.map((c, i) => (
              <li key={i}>
                <strong>{c.instrument}</strong>: {c.citation}{" "}
                <Badge color={c.type === "binding" ? "red" : "slate"}>{c.type || ""}</Badge>
                {c.url && <> — <a className="text-blue-600 underline" href={c.url} target="_blank" rel="noreferrer">link</a></>}
              </li>
            ))}
          </ul>
        </section>
      )}
    </div>
  );
}

/* ---------- Action Checklist ---------- */
function ActionChecklist({ items }) {
  const [checked, setChecked] = useState({});
  return (
    <ul className="space-y-2">
      {items.map((a, i) => (
        <li key={i} className={`flex items-start gap-2 p-2 rounded ${checked[i] ? "bg-emerald-50" : ""}`}>
          <input
            type="checkbox"
            checked={!!checked[i]}
            onChange={() => setChecked({ ...checked, [i]: !checked[i] })}
            className="mt-0.5"
          />
          <div className="flex-1 text-sm">
            <div className="flex items-center gap-2 flex-wrap">
              <Badge color={a.priority === "P1" ? "red" : a.priority === "P2" ? "amber" : "blue"}>{a.priority}</Badge>
              <span className={`font-medium ${checked[i] ? "line-through text-slate-400" : "text-slate-800"}`}>
                {a.action}
              </span>
            </div>
            <div className="text-xs text-slate-600 mt-0.5">
              Role: {a.role} · Basis: {a.basis} · Criteria: {a.criteria}
            </div>
          </div>
        </li>
      ))}
    </ul>
  );
}

/* ==================== ERROR BOUNDARY ==================== */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    // eslint-disable-next-line no-console
    if (typeof console !== "undefined") console.error("App error:", error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div className="max-w-2xl mx-auto p-6">
          <div className="border-2 border-red-300 bg-red-50 rounded-lg p-5">
            <h2 className="font-bold text-red-900 mb-2">Something went wrong</h2>
            <p className="text-sm text-red-800 mb-3">
              The assessment hit an unexpected error. Your saved answers are still in storage and will be loaded next time.
            </p>
            <pre className="text-xs bg-white border border-red-200 rounded p-2 overflow-auto max-h-40">
              {String(this.state.error && this.state.error.message)}
            </pre>
            <div className="mt-3 flex gap-2">
              <button
                onClick={() => this.setState({ error: null })}
                className="px-3 py-1.5 bg-red-600 text-white rounded text-sm hover:bg-red-700"
              >
                Try again
              </button>
              <button
                onClick={() => {
                  try {
                    if (typeof window !== "undefined" && window.localStorage) {
                      const toRemove = [];
                      for (let i = 0; i < window.localStorage.length; i++) {
                        const k = window.localStorage.key(i);
                        if (k && k.startsWith("gxp_assessment:")) toRemove.push(k);
                      }
                      toRemove.forEach((k) => window.localStorage.removeItem(k));
                    }
                  } catch (e) {}
                  if (typeof window !== "undefined" && window.location) window.location.reload();
                }}
                className="px-3 py-1.5 border border-red-300 rounded text-sm"
              >
                Reset & reload
              </button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ==================== ROOT APP ==================== */
function AppInner() {
  const [state, dispatch] = useReducer(reducer, initialState, (s) => ({ ...s, sessionId: genId() }));
  const [savedFlash, setSavedFlash] = useState(false);

  // Load from storage once
  useEffect(() => {
    const keys = [];
    try {
      if (typeof window !== "undefined" && window.localStorage) {
        for (let i = 0; i < window.localStorage.length; i++) {
          const k = window.localStorage.key(i);
          if (k && k.startsWith("gxp_assessment:")) keys.push(k);
        }
      }
    } catch (e) {}
    if (keys.length > 0) {
      try {
        const raw = storage.get(keys[0]);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.sessionId) dispatch({ type: "LOAD", payload: parsed });
        }
      } catch (e) {}
    }
  // eslint-disable-next-line
  }, []);

  // Autosave
  useEffect(() => {
    if (!state.sessionId) return;
    try {
      storage.set(`gxp_assessment:${state.sessionId}`, JSON.stringify(state));
      setSavedFlash(true);
      const t = setTimeout(() => setSavedFlash(false), 1200);
      return () => clearTimeout(t);
    } catch (e) {}
  }, [state]);

  const { answered, total } = countTotalQuestions(state);

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900">
      <style>{`
        @media print {
          .print\\:hidden { display: none !important; }
          body { background: white; }
        }
      `}</style>

      {/* Top bar */}
      <header className="sticky top-0 z-10 bg-white border-b border-slate-200 print:hidden">
        <div className="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded bg-gradient-to-br from-blue-600 to-violet-600 flex items-center justify-center text-white font-bold text-sm">
              Gx
            </div>
            <div>
              <div className="font-semibold text-sm">GxP AI Governance Assessment</div>
              <div className="text-xs text-slate-500">
                {state.org ? `${state.org} · ` : ""}Session {state.sessionId?.slice(0, 8)}
              </div>
            </div>
          </div>
          <div className="flex-1 max-w-md">
            <ProgressBar answered={answered} total={total} />
          </div>
          <div className="text-xs">
            {savedFlash && <span className="text-emerald-600">✓ Saved</span>}
          </div>
        </div>
      </header>

      <main>
        {state.phase === "welcome" && <WelcomeScreen state={state} dispatch={dispatch} />}
        {state.phase === "intake" && <IntakeScreen state={state} dispatch={dispatch} />}
        {state.phase === "module" && <ModuleScreen state={state} dispatch={dispatch} savedFlash={savedFlash} />}
        {state.phase === "report" && <ReportScreen state={state} dispatch={dispatch} />}
      </main>

      <footer className="py-6 text-center text-xs text-slate-400 print:hidden">
        GxP AI Adoption & Governance Assessment Tool · Build Brief v1.0 · April 2026
      </footer>
    </div>
  );
}

function App() {
  return (
    <ErrorBoundary>
      <AppInner />
    </ErrorBoundary>
  );
}    // Mount the React application into the root div
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
